name: Bug report — false positive
description: A comment that should NOT have been flagged was removed or rewritten
labels: ["false-positive", "bug"]
body:
  - type: markdown
    attributes:
      value: |
        Use this template when undercover incorrectly flags a comment that is **not** an AI signature (e.g. a legitimate workaround explanation, a meaningful TODO, a well-placed note).
  - type: input
    id: pattern
    attributes:
      label: Pattern ID
      description: The `id` field from the scan output (e.g. `note-that`, `obvious-comment`)
      placeholder: e.g. note-that
    validations:
      required: true
  - type: textarea
    id: line
    attributes:
      label: Flagged line
      description: The exact comment line that was incorrectly flagged
      render: text
    validations:
      required: true
  - type: input
    id: language
    attributes:
      label: Language / file type
      placeholder: e.g. TypeScript, Python, Go
    validations:
      required: true
  - type: textarea
    id: context
    attributes:
      label: Context
      description: A few lines of surrounding code so we can see why this comment is meaningful
      render: text
