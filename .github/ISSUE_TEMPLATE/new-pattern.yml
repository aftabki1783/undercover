name: New pattern suggestion
description: Suggest a new AI-signature pattern to detect
labels: ["enhancement", "new-pattern"]
body:
  - type: markdown
    attributes:
      value: |
        Suggest a comment pattern that reliably indicates AI-generated code and should be stripped.
  - type: textarea
    id: pattern
    attributes:
      label: Pattern example(s)
      description: One or more concrete lines that should be flagged
      render: text
      placeholder: |
        // As an AI language model, I...
        # The above code demonstrates...
    validations:
      required: true
  - type: input
    id: action
    attributes:
      label: Suggested action
      description: Should the line be removed entirely, or just stripped of a prefix?
      placeholder: remove / strip prefix
    validations:
      required: true
  - type: textarea
    id: rationale
    attributes:
      label: Why is this an AI signature?
      description: Explain why this pattern clusters in AI-generated code and is unlikely in human-written code
    validations:
      required: true
  - type: input
    id: languages
    attributes:
      label: Languages affected
      placeholder: e.g. all, Python only, JS/TS
