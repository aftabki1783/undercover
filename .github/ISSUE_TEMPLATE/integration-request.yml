name: Agent integration request
description: Request or contribute support for a new AI agent / IDE
labels: ["enhancement", "integration"]
body:
  - type: input
    id: agent
    attributes:
      label: Agent / tool name
      placeholder: e.g. Aider, Continue.dev, Cline, Windsurf
    validations:
      required: true
  - type: textarea
    id: mechanism
    attributes:
      label: How does this agent load instructions?
      description: Describe the config file format, file path, or API the agent uses to receive custom instructions
    validations:
      required: true
  - type: checkboxes
    id: contribution
    attributes:
      label: Are you willing to contribute this integration?
      options:
        - label: Yes, I'll open a PR
        - label: No, just requesting it
